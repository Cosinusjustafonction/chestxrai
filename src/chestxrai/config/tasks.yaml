# ──────────────────────────────────────────────────────────────
# Medical Image Triage — Multi-Agent System
# CrewAI Task Definitions
# ──────────────────────────────────────────────────────────────

analyze_xray:
  description: >
    Analyze the chest X-ray image located at: {image_path}

    Use the xray_triage tool to run inference on the image. The tool returns:
    - Predicted probabilities for 14 thoracic pathologies
    - Severity classification (Normal / Abnormal / Critical)
    - Grad-CAM heatmap path highlighting regions of concern

    Based on the tool output:
    1. List all pathologies with probability > 0.3 as "detected"
    2. List pathologies with probability 0.15–0.3 as "borderline"
    3. Flag the top finding (highest probability pathology)
    4. Note the Grad-CAM focus region (e.g., "right lower lobe", "bilateral")
    5. Assign an overall severity: Normal (no findings > 0.3),
       Abnormal (any finding 0.3–0.7), Critical (any finding > 0.7)

    Be precise. Do not hallucinate findings that the tool did not return.
  expected_output: >
    A structured JSON with keys: detected_pathologies (list of {name, probability}),
    borderline_pathologies (list), top_finding, gradcam_region, severity,
    gradcam_heatmap_path, and a brief radiologist_note.
  agent: radiologist

vlm_review:
  description: >
    Visually inspect the chest X-ray at: {image_path}

    Use the vlm_image_review tool to examine the original X-ray and its Grad-CAM
    attention heatmaps with a local vision model. The tool automatically finds the
    corresponding Grad-CAM overlays for the image.

    Based on the visual analysis, report:
    1. Anatomical findings visible in the image (opacities, effusions, cardiac size, etc.)
    2. Whether the Grad-CAM activation regions correspond to correct anatomical locations
    3. Image quality assessment (rotation, exposure, artefacts)
    4. Your overall visual impression — does the visual evidence support the DenseNet findings?
  expected_output: >
    A structured visual radiological interpretation with four labelled sections:
    ANATOMICAL FINDINGS, GRAD-CAM VALIDATION, IMAGE QUALITY, and VISUAL IMPRESSION.
    Written in standard radiology terminology, concise and clinically precise.
  agent: vlm_reviewer
  context:
    - analyze_xray

retrieve_guidelines:
  description: >
    Based on the radiologist's findings, retrieve clinical guidelines for each
    detected pathology.

    Use the guideline_lookup tool for each detected pathology to retrieve:
    - Clinical definition and significance
    - Severity grading criteria
    - Recommended follow-up actions
    - Urgency classification
    - Differential diagnoses to consider

    If multiple pathologies are detected, assess their clinical interaction:
    - Are they likely related (e.g., cardiomegaly + effusion = heart failure)?
    - Does the combination change the urgency level?
    - Are there contraindicated follow-up actions?

    Provide a synthesized clinical assessment, not just a list of individual
    guideline entries.
  expected_output: >
    A structured JSON with keys: pathology_guidelines (list of {pathology,
    definition, severity_grade, follow_up, urgency, differentials}),
    clinical_interactions (list of noted interactions),
    overall_urgency (routine / urgent / emergent),
    and a clinical_summary paragraph.
  agent: clinical_advisor
  context:
    - analyze_xray
    - vlm_review

generate_report:
  description: >
    Generate a structured medical triage report by synthesizing the radiologist's
    imaging findings and the clinical advisor's guideline recommendations.

    The report MUST follow this structure:

    ## TRIAGE REPORT
    **Urgency:** [NORMAL / ABNORMAL / CRITICAL]

    ### 1. Indication
    Automated chest X-ray triage screening.

    ### 2. Technique
    Frontal chest radiograph analyzed using DenseNet121 (HERD-optimized)
    with Grad-CAM attention mapping.

    ### 3. Findings
    [List each detected pathology with confidence %, Grad-CAM region,
    and brief description. Include borderline findings separately.]

    ### 4. Clinical Context
    [Relevant guidelines, severity grading, and clinical interactions
    from the clinical advisor.]

    ### 5. Impression
    [2-3 sentence summary of the most clinically significant findings.]

    ### 6. Recommendations
    [Numbered list of recommended actions, ordered by urgency.]

    ### 7. Disclaimer
    This report was generated by an AI-assisted triage system and requires
    review by a qualified physician before clinical action.

    IMPORTANT: This report will be presented to a physician for approval
    via the human-in-the-loop checkpoint. Be accurate, concise, and
    clinically actionable.
  expected_output: >
    A complete, formatted medical triage report following the structure above.
    The report must be clear enough for an attending physician to make a
    disposition decision within 60 seconds of reading.
  agent: report_generator
  context:
    - analyze_xray
    - vlm_review
    - retrieve_guidelines